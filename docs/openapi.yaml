openapi: 3.0.3
info:
  title: UniEventos API
  description: RESTful API for the university event management platform UniEventos.
  version: 1.0.0
  contact:
    name: UniEventos Team
    email: admin@unieventos.com

servers:
  - url: http://localhost:8000/api
    description: Local development server

tags:
  - name: Authentication
    description: User registration, login, logout and profile
  - name: Events
    description: Event management
  - name: Registrations
    description: Event registration management
  - name: Feedbacks
    description: Event feedback management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation completed successfully
        data:
          type: object
          nullable: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        role:
          type: string
          enum: [admin, organizer, participant]
          example: participant
        course:
          type: string
          nullable: true
          example: Computer Science
        department:
          type: string
          nullable: true
          example: Engineering
        created_at:
          type: string
          format: date-time

    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        location:
          type: string
        event_date:
          type: string
          format: date-time
        vacancies:
          type: integer
        available_vacancies:
          type: integer
        status:
          type: string
          enum: [pending, approved, cancelled]
        organizer_id:
          type: integer
        organizer:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Registration:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [pending, approved, rejected, cancelled]
        event_id:
          type: integer
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time

    Feedback:
      type: object
      properties:
        id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        event_id:
          type: integer
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time

paths:
  /register:
    post:
      tags: [Authentication]
      summary: Register a new participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                password_confirmation:
                  type: string
                course:
                  type: string
                department:
                  type: string
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
                          token:
                            type: string
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /login:
    post:
      tags: [Authentication]
      summary: Authenticate user and receive token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials

  /logout:
    post:
      tags: [Authentication]
      summary: Revoke current access token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out successfully
        '401':
          description: Unauthenticated

  /me:
    get:
      tags: [Authentication]
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          description: Unauthenticated

  /events:
    get:
      tags: [Events]
      summary: List events
      description: |
        Returns approved events for guests and participants.
        Organizers see their own events plus approved events.
        Admins see all events.
      responses:
        '200':
          description: Events listed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          events:
                            type: array
                            items:
                              $ref: '#/components/schemas/Event'
                          pagination:
                            type: object
                            properties:
                              current_page:
                                type: integer
                              last_page:
                                type: integer
                              per_page:
                                type: integer
                              total:
                                type: integer

    post:
      tags: [Events]
      summary: Create a new event
      description: Only organizers and admins can create events. Events start as pending.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, location, event_date, vacancies]
              properties:
                title:
                  type: string
                description:
                  type: string
                location:
                  type: string
                event_date:
                  type: string
                  format: date-time
                vacancies:
                  type: integer
                  minimum: 1
      responses:
        '201':
          description: Event created successfully
        '403':
          description: Unauthorized
        '422':
          description: Validation failed

  /events/{id}:
    get:
      tags: [Events]
      summary: Get event details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Event retrieved successfully
        '403':
          description: Unauthorized
        '404':
          description: Event not found

    put:
      tags: [Events]
      summary: Update an event
      description: Organizers can update own events. Admins can update any event and change status.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                location:
                  type: string
                event_date:
                  type: string
                  format: date-time
                vacancies:
                  type: integer
                status:
                  type: string
                  enum: [pending, approved, cancelled]
                  description: Admin only
      responses:
        '200':
          description: Event updated successfully
        '403':
          description: Unauthorized
        '422':
          description: Validation failed

    delete:
      tags: [Events]
      summary: Delete an event
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Event deleted successfully
        '403':
          description: Unauthorized
        '404':
          description: Event not found

  /events/{id}/register:
    post:
      tags: [Registrations]
      summary: Register for an event
      description: Participants only. Event must be approved with available vacancies.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Registration completed successfully
        '403':
          description: Unauthorized
        '422':
          description: Business rule violation

    delete:
      tags: [Registrations]
      summary: Cancel event registration
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Registration cancelled successfully
        '403':
          description: Unauthorized
        '422':
          description: Registration not found

  /events/{id}/registrations:
    get:
      tags: [Registrations]
      summary: List event registrations
      description: Event organizer and admin only.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Registrations listed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Registration'
        '403':
          description: Unauthorized

  /events/{id}/feedback:
    post:
      tags: [Feedbacks]
      summary: Submit event feedback
      description: Registered participants only. One feedback per user per event. Rating 1-5.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
                  maxLength: 1000
      responses:
        '201':
          description: Feedback submitted successfully
        '403':
          description: Unauthorized
        '422':
          description: Validation or business rule failure

  /events/{id}/feedbacks:
    get:
      tags: [Feedbacks]
      summary: List event feedbacks
      description: Available for approved events.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Feedbacks listed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Feedback'
        '403':
          description: Event not approved
