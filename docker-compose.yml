services:

  app:
    build: .
    container_name: unieventos-app

    working_dir: /var/www

    volumes:
      - .:/var/www

    ports:
      - "8000:8000"

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0

    container_name: unieventos-mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: unieventos
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin

    container_name: unieventos-phpmyadmin

    restart: unless-stopped

    ports:
      - "8080:80"

    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root

    depends_on:
      - mysql

volumes:
  mysql_data: